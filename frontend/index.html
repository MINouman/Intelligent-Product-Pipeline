<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rokomari AI Pipeline - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .metric-card { transition: transform 0.2s; }
        .metric-card:hover { transform: translateY(-5px); }
        .navbar-brand { font-weight: bold; }
        .status-badge { font-size: 0.85rem; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-rocket-takeoff"></i> Rokomari AI Pipeline
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="duplicates.html">Duplicates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="validation.html">Validation</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <h1 class="mb-4">Pipeline Dashboard</h1>

        <!-- Status Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card metric-card text-white bg-success">
                    <div class="card-body">
                        <h6 class="card-title">
                            <i class="bi bi-check-circle"></i> Normalized
                        </h6>
                        <h2 class="mb-0" id="normalized-count">-</h2>
                        <small class="status-badge">Success Rate: <span id="norm-rate">-</span>%</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card text-white bg-info">
                    <div class="card-body">
                        <h6 class="card-title">
                            <i class="bi bi-stars"></i> Enriched
                        </h6>
                        <h2 class="mb-0" id="enriched-count">-</h2>
                        <small class="status-badge">With AI Features</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card text-white bg-warning">
                    <div class="card-body">
                        <h6 class="card-title">
                            <i class="bi bi-diagram-3"></i> Duplicates
                        </h6>
                        <h2 class="mb-0" id="duplicate-count">-</h2>
                        <small class="status-badge">Groups Found</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card text-white bg-primary">
                    <div class="card-body">
                        <h6 class="card-title">
                            <i class="bi bi-shield-check"></i> Validated
                        </h6>
                        <h2 class="mb-0" id="validated-count">-</h2>
                        <small class="status-badge">Quality Checked</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-3">
            <!-- Quality Distribution -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-light">
                        <h5 class="mb-0"><i class="bi bi-bar-chart"></i> Quality Distribution</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="qualityChart" height="200"></canvas>
                    </div>
                </div>
            </div>

            <!-- Duplicate Methods -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-light">
                        <h5 class="mb-0"><i class="bi bi-pie-chart"></i> Detection Methods</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="methodsChart" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vendor Stats -->
        <div class="card mt-3">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-building"></i> Vendor API Status</h5>
            </div>
            <div class="card-body">
                <div class="row g-2" id="vendor-stats">
                    <!-- Will be populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
